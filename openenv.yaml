# openenv.yaml — environment specification for AutoFactoryToDEnv

name: AutoFactoryToDEnv
version: "1.0.0"
description: >
  24-step (1 hour each) factory production scheduling environment.
  Goal: meet 8000 parts/day while minimising electricity cost,
  machine wear, and CO2 emissions.

author: "srmraees-stack"
tags:
  - openenv
  - manufacturing
  - task-oriented-dialogue

# -------------------------------------------------------------------
# Tasks & Graders  (required: minimum 3, each with a callable grader)
# -------------------------------------------------------------------
tasks:
  - id: task_easy
    name: "Simple Order Lookup"
    description: >
      Agent must retrieve a single order status from the factory system.
      Difficulty: easy. Expected baseline score ≥ 0.5.
    difficulty: easy
    grader: "server.graders:grade_easy_task"
    max_steps: 24
    target_score: 0.7

  - id: task_medium
    name: "Multi-Step Production Query"
    description: >
      Agent must handle a multi-turn dialogue to resolve a production
      scheduling conflict. Difficulty: medium. Requires conflict
      identification and a correct resolution proposal.
    difficulty: medium
    grader: "server.graders:grade_medium_task"
    max_steps: 24
    target_score: 0.5

  - id: task_hard
    name: "Complex Supply Chain Resolution"
    description: >
      Agent must coordinate across inventory, scheduling, and logistics
      to resolve a multi-constraint supply chain disruption.
      Difficulty: hard. Frontier models expected to score ~0.3.
    difficulty: hard
    grader: "server.graders:grade_hard_task"
    max_steps: 24
    target_score: 0.3

# -------------------------------------------------------------------
# Server
# -------------------------------------------------------------------
server:
  base_url: http://localhost:7860
  endpoints:
    reset:  POST /reset
    step:   POST /step
    state:  GET  /state
    tasks:  GET  /tasks
    grade:  POST /grade/{task_id}
    health: GET  /health

# -------------------------------------------------------------------
# Episode
# -------------------------------------------------------------------
episode:
  steps: 24
  step_duration_hours: 1
  production_target_parts_per_day: 8000

# -------------------------------------------------------------------
# Action space
# -------------------------------------------------------------------
action_space:
  type: MultiDiscrete
  fields:
    stamping:
      values: [0, 1, 2]
      description: "0=idle, 1=half-power, 2=full-power"
    molding:
      values: [0, 1, 2]
      description: "0=idle, 1=half-power, 2=full-power"
    cnc:
      values: [0, 1, 2]
      description: "0=idle, 1=half-power, 2=full-power"
    compressor:
      values: [0, 1]
      description: "0=off, 1=on (boosts total production by +15%)"
    welder:
      values: [0, 1, 2]
      description: "0=off, 1=full-power, 2=maintenance (restores health)"

# -------------------------------------------------------------------
# Observation space
# -------------------------------------------------------------------
observation_space:
  hour:
    type: int
    range: [0, 23]
    description: "Current hour of the day"
  production_so_far:
    type: float
    range: [0, inf]
    description: "Cumulative parts produced so far in this episode"
  machine_health:
    type: list[float]
    length: 5
    range: [0.0, 1.0]
    order: [stamping, molding, cnc, compressor, welder]
    description: "Per-machine health fraction (1.0=perfect, 0.0=broken)"
  electricity_price:
    type: float
    unit: "INR/MWh"
    description: "Current time-of-day electricity tariff"
  production_target:
    type: float
    description: "Total parts required to complete the episode"

# -------------------------------------------------------------------
# Tariffs (INR/MWh, time-of-day)
# -------------------------------------------------------------------
tariffs:
  night:
    rate: 710.60
    windows: ["00:00-05:00", "22:00-24:00"]
  normal:
    rate: 748.60
    windows: ["05:00-06:00", "10:00-18:00"]
  peak:
    rate: 935.75
    windows: ["06:00-10:00", "18:00-22:00"]

# -------------------------------------------------------------------
# Machine definitions
# -------------------------------------------------------------------
machines:
  - name: stamping
    base_output:  [0, 150, 300]
    power_mwh:    [0.0, 0.4, 0.8]
    health_loss:  [0.0, 0.005, 0.012]

  - name: molding
    base_output:  [0, 130, 260]
    power_mwh:    [0.0, 0.35, 0.70]
    health_loss:  [0.0, 0.005, 0.012]

  - name: cnc
    base_output:  [0, 110, 220]
    power_mwh:    [0.0, 0.3, 0.60]
    health_loss:  [0.0, 0.004, 0.010]

  - name: compressor
    role: booster
    boost_factor: 1.15
    power_mwh:    [0.0, 0.25]
    health_loss:  [0.0, 0.008]

  - name: welder
    base_output:  [0, 80, 0]
    power_mwh:    [0.0, 0.5, 0.1]
    health_loss:  [0.0, 0.008, -0.020]

# -------------------------------------------------------------------
# Reward function
# -------------------------------------------------------------------
reward:
  description: >
    Composite reward balancing production progress, electricity cost,
    machine wear, and CO2 emissions.
  weights:
    production: +0.50
    cost:       -0.30
    wear:       -0.10
    co2:        -0.10
  co2_intensity_kg_per_mwh: 0.4